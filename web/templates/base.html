<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Open Data Analytics {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e17;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e2d45;
      --accent: #3b82f6;
      --accent2: #7c3aed;
      --green: #10b981;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }
    .sidebar-logo {
      padding: 28px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .sidebar-logo h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .nav {
      flex: 1;
      padding: 16px 0;
    }
    .nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      transition: all .15s;
      border-left: 3px solid transparent;
    }
    .nav a:hover { color: var(--text); background: var(--surface2); }
    .nav a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(59,130,246,.07); }
    .nav .icon { width: 18px; text-align: center; font-size: 15px; }

    .main {
      margin-left: 220px;
      flex: 1;
      padding: 40px 48px;
      max-width: 1100px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .page-subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .card .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }
    .card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      background: var(--surface);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 9px 14px; color: var(--text); }

    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .section h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .figures-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .figure-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .figure-card img { width: 100%; display: block; }
    .figure-card .fig-label {
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .hero {
      padding: 48px 0 40px;
    }
    .hero .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }
    .hero h2 {
      font-size: 34px;
      font-weight: 300;
      line-height: 1.25;
      margin-bottom: 16px;
    }
    .hero h2 strong { font-weight: 600; }
    .hero p { color: var(--muted); font-size: 15px; max-width: 560px; line-height: 1.7; }

    .pipeline {
      display: flex;
      gap: 0;
      margin: 36px 0;
      flex-wrap: wrap;
    }
    .pipeline-step {
      flex: 1;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 18px 16px;
      position: relative;
    }
    .pipeline-step:not(:last-child)::after {
      content: '→';
      position: absolute;
      right: -13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 16px;
      z-index: 1;
    }
    .pipeline-step .step-num {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .pipeline-step .step-name { font-size: 13px; font-weight: 600; }
    .pipeline-step .step-desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      margin: 3px 3px 3px 0;
    }
    .badge.green { border-color: var(--green); color: var(--green); }
    .badge.blue  { border-color: var(--accent); color: var(--accent); }

    .kv { display: flex; gap: 32px; flex-wrap: wrap; }
    .kv-item .k {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .kv-item .v { font-size: 18px; font-weight: 600; color: var(--text); }

    .empty { color: var(--muted); font-size: 13px; font-style: italic; }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="tag">Lab 3</div>
    <h1>Open Data<br>Analytics</h1>
  </div>
  <div class="nav">
    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
      <span class="icon">⌂</span> Головна
    </a>
    <a href="/data" class="{% if request.path == '/data' %}active{% endif %}">
      <span class="icon">⊞</span> Дані
    </a>
    <a href="/quality" class="{% if request.path == '/quality' %}active{% endif %}">
      <span class="icon">✓</span> Якість даних
    </a>
    <a href="/research" class="{% if request.path == '/research' %}active{% endif %}">
      <span class="icon">◈</span> Дослідження
    </a>
    <a href="/visualization" class="{% if request.path == '/visualization' %}active{% endif %}">
      <span class="icon">▦</span> Візуалізація
    </a>
  </div>
</nav>
<main class="main">
  {% block content %}{% endblock %}
</main>
</body>
</html>
