name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:
    inputs:
      module:
        description: "Module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality
          - data_research

jobs:
  run-modules:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: data_load
            script: src/data_load.py
            log: artifacts/data_load_log.txt
          - module: data_quality
            script: src/data_quality_analysis.py
            log: artifacts/data_quality_log.txt
          - module: data_research
            script: src/data_research.py
            log: artifacts/data_research_log.txt

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib seaborn

      - name: Create artifacts folder
        run: mkdir -p artifacts

      - name: Skip non-selected module
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.module != 'all' && github.event.inputs.module != matrix.module
        run: |
          echo "Skipping ${{ matrix.module }} because manually selected module is ${{ github.event.inputs.module }}"
          exit 0

      - name: Run module
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        run: |
          python ${{ matrix.script }} > ${{ matrix.log }} 2>&1

      - name: Upload artifacts
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts