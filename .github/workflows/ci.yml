name: CI (modules)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Which module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  run-modules:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib scikit-learn

      - name: Create artifact directory
        run: mkdir -p artifacts/${{ matrix.module }}

      - name: Run selected module
        run: |
          echo "Running ${{ matrix.module }}"

          if [ "${{ matrix.module }}" = "data_load" ]; then
            python src/data_load.py > artifacts/${{ matrix.module }}/run.log 2>&1
            cp -r data/raw artifacts/${{ matrix.module }}/ || true
          fi

          if [ "${{ matrix.module }}" = "data_quality_analysis" ]; then
            python src/data_load.py > artifacts/${{ matrix.module }}/run.log 2>&1
            python src/data_quality_analysis.py >> artifacts/${{ matrix.module }}/run.log 2>&1
            cp reports/data_quality_report.txt artifacts/${{ matrix.module }}/ || true
          fi

          if [ "${{ matrix.module }}" = "data_research" ]; then
            python src/data_load.py > artifacts/${{ matrix.module }}/run.log 2>&1
            python src/data_research.py >> artifacts/${{ matrix.module }}/run.log 2>&1
            cp -r reports/data_research artifacts/${{ matrix.module }}/ || true
          fi

          if [ "${{ matrix.module }}" = "visualization" ]; then
            python src/data_load.py > artifacts/${{ matrix.module }}/run.log 2>&1
            python src/data_research.py >> artifacts/${{ matrix.module }}/run.log 2>&1
            python src/visualization.py >> artifacts/${{ matrix.module }}/run.log 2>&1
            cp -r reports/figures artifacts/${{ matrix.module }}/ || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}