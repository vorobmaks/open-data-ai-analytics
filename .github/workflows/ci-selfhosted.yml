name: CI (self-hosted runner)

on:
  workflow_dispatch:

jobs:
  run-visualization-local:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Python
        run: |
          python --version
          python -m pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas matplotlib scikit-learn

      - name: Create artifact directory
        run: |
          mkdir artifacts
          mkdir artifacts\visualization

      - name: Run visualization pipeline
        run: |
          python src/data_load.py > artifacts\visualization\run.log
          python src/data_research.py >> artifacts\visualization\run.log
          python src/visualization.py >> artifacts\visualization\run.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization-selfhosted
          path: artifacts/visualization