name: CI (self-hosted runner)

on:
  workflow_dispatch:

jobs:
  run-visualization-local:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Python
        shell: cmd
        run: |
          py --version
          py -m pip --version

      - name: Install dependencies
        shell: cmd
        run: |
          py -m pip install --upgrade pip
          py -m pip install pandas matplotlib scikit-learn

      - name: Create artifact directory
        shell: cmd
        run: |
          if not exist artifacts mkdir artifacts
          if not exist artifacts\visualization mkdir artifacts\visualization

      - name: Run visualization pipeline
        shell: cmd
        run: |
          py src\data_load.py > artifacts\visualization\run.log
          py src\data_research.py >> artifacts\visualization\run.log
          py src\visualization.py >> artifacts\visualization\run.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-visualization-selfhosted
          path: artifacts/visualization